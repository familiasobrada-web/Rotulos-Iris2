<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Rótulos Iris · App sincronizada</title>
  <meta name="theme-color" content="#0f172a" />

  <style>
    :root{
      --bg:#f3f6fb;
      --panel:#ffffff;
      --panel-2:#f8fbff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --success:#16a34a;
      --success-2:#15803d;
      --warning:#f59e0b;
      --danger:#dc2626;
      --danger-2:#b91c1c;
      --shadow:0 14px 36px rgba(15,23,42,.08);
      --radius:20px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    body{min-height:100vh}
    #app{min-height:100vh}

    .wrap{
      width:min(1380px,100%);
      margin:0 auto;
      padding:22px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:18px;
      background:linear-gradient(135deg,#2563eb,#22c55e);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:22px;
      box-shadow:var(--shadow);
      flex:0 0 auto;
    }

    .brand-copy h1{
      margin:0;
      font-size:38px;
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .brand-copy p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .userbox{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#eef4ff;
      color:#1e3a8a;
      border:1px solid #dbeafe;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .chip.gray{
      background:#f8fafc;
      color:#334155;
      border-color:#e2e8f0;
    }

    .layout{
      display:grid;
      grid-template-columns:280px 1fr;
      gap:20px;
      align-items:start;
    }

    .sidebar,
    .panel,
    .hero,
    .kpi,
    .job-card,
    .task-card,
    .login-card,
    .report-card{
      background:var(--panel);
      border:1px solid rgba(226,232,240,.95);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }

    .sidebar{
      padding:16px;
      position:sticky;
      top:18px;
    }

    .nav-title{
      margin:4px 0 12px;
      font-size:13px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:800;
    }

    .nav{
      display:grid;
      gap:8px;
    }

    .nav button{
      width:100%;
      text-align:left;
      border:none;
      background:#f8fafc;
      color:#0f172a;
      padding:14px 16px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      transition:.18s ease;
    }

    .nav button:hover{
      background:#eef4ff;
      transform:translateY(-1px);
    }

    .nav button.active{
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
    }

    .side-meta{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--line);
      display:grid;
      gap:8px;
      color:var(--muted);
      font-size:14px;
    }

    .content{
      display:grid;
      gap:18px;
    }

    .hero{
      padding:18px;
      display:grid;
      gap:16px;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 38%),
        radial-gradient(circle at bottom left, rgba(34,197,94,.08), transparent 32%),
        var(--panel);
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:14px;
    }

    .kpi{
      padding:16px;
      background:linear-gradient(180deg,#ffffff,#f8fbff);
    }

    .kpi .label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:10px;
    }

    .kpi .value{
      font-size:34px;
      line-height:1;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .panel{padding:18px}

    .panel h2{
      margin:0 0 6px;
      font-size:28px;
      letter-spacing:-.03em;
    }

    .subtext{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      margin-top:16px;
      display:grid;
      grid-template-columns:1.2fr 1fr 1fr auto;
      gap:12px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:14px;
    }

    .jobs-list{
      display:grid;
      gap:16px;
      margin-top:18px;
    }

    .job-card{
      padding:18px;
      overflow:hidden;
    }

    .job-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .job-title{
      margin:0;
      font-size:32px;
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .job-badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:800;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
    }

    .badge.primary{background:#eff6ff;border-color:#dbeafe;color:#1d4ed8}
    .badge.success{background:#f0fdf4;border-color:#dcfce7;color:#166534}
    .badge.warning{background:#fffbeb;border-color:#fde68a;color:#92400e}
    .badge.dark{background:#e2e8f0;border-color:#cbd5e1;color:#0f172a}

    .job-desc{
      margin:12px 0 0;
      color:#334155;
      font-size:15px;
      line-height:1.5;
    }

    .job-times{
      display:grid;
      gap:8px;
      min-width:260px;
      text-align:right;
      color:#334155;
      font-size:14px;
      font-weight:700;
    }

    .job-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .tasks-grid{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .task-card{
      padding:16px;
      background:linear-gradient(180deg,#ffffff,#fbfdff);
    }

    .task-title{
      margin:0 0 10px;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .time-label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-top:6px;
    }

    .time-value{
      margin-top:6px;
      font-size:40px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.05em;
    }

    .task-status{
      margin-top:10px;
      font-size:14px;
      font-weight:700;
      color:#334155;
    }

    .task-actions{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .manual-grid,
    .hours-grid{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:10px;
      margin-top:14px;
    }

    details{
      margin-top:14px;
      border-top:1px solid var(--line);
      padding-top:14px;
    }

    summary{
      cursor:pointer;
      user-select:none;
      font-weight:800;
      color:#0f172a;
    }

    .hours-meta{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .report-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .report-card{
      padding:16px;
    }

    .report-card h3{
      margin:0 0 12px;
      font-size:18px;
    }

    .report-list{
      display:grid;
      gap:8px;
    }

    .report-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:12px;
      font-size:14px;
    }

    .login-shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34,197,94,.10), transparent 28%),
        var(--bg);
    }

    .login-card{
      width:min(520px,100%);
      padding:24px;
    }

    .login-card h2{
      margin:0 0 8px;
      font-size:34px;
      letter-spacing:-.04em;
    }

    .login-card p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.5;
    }

    label{
      display:block;
      margin:14px 0 8px;
      font-size:14px;
      font-weight:800;
      color:#0f172a;
    }

    input, select, textarea, button{font:inherit}

    input, select, textarea{
      width:100%;
      border:1px solid #dbe3ee;
      background:#fff;
      color:#0f172a;
      border-radius:14px;
      padding:13px 14px;
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font-weight:800;
      cursor:pointer;
      transition:transform .18s ease, opacity .18s ease, box-shadow .18s ease, background .18s ease;
      box-shadow:0 8px 18px rgba(15,23,42,.08);
    }

    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
    .btn-success{background:linear-gradient(135deg,var(--success),var(--success-2));color:#fff}
    .btn-warning{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
    .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
    .btn-soft{background:#eef4ff;color:#1d4ed8}
    .btn-gray{background:#e2e8f0;color:#475569}

    .empty{
      padding:28px;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      text-align:center;
      color:var(--muted);
      background:#f8fafc;
      margin-top:16px;
    }

    .error-box{
      margin-top:14px;
      border:1px solid #fecaca;
      background:#fef2f2;
      color:#991b1b;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
    }

    .ok-box{
      margin-top:14px;
      border:1px solid #bbf7d0;
      background:#f0fdf4;
      color:#166534;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
    }

    .loader{
      width:54px;
      height:54px;
      border-radius:50%;
      border:4px solid #dbeafe;
      border-top-color:#2563eb;
      animation:spin 1s linear infinite;
      margin:80px auto;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    @media (max-width:1180px){
      .kpis{grid-template-columns:repeat(3,1fr)}
      .tasks-grid{grid-template-columns:1fr 1fr}
      .report-grid{grid-template-columns:1fr}
    }

    @media (max-width:900px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:static}
      .toolbar,
      .grid-2{grid-template-columns:1fr}
      .job-top{flex-direction:column}
      .job-times{text-align:left;min-width:0}
      .kpis{grid-template-columns:1fr 1fr}
    }

    @media (max-width:680px){
      .wrap{padding:12px}
      .topbar{align-items:flex-start;flex-direction:column}
      .brand-copy h1{font-size:28px}
      .brand-copy p{font-size:13px}
      .sidebar,
      .panel,
      .hero,
      .job-card,
      .task-card,
      .login-card{border-radius:18px}
      .kpis,
      .tasks-grid,
      .task-actions,
      .manual-grid,
      .hours-grid{grid-template-columns:1fr}
      .kpi .value{font-size:28px}
      .time-value{font-size:34px}
      .btn{width:100%}
      input,select,textarea{font-size:16px}
      .userbox{width:100%;justify-content:flex-start}
      .job-title{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://zfdusqdyaauwdhegzdvi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_6_ewdXEtND8whXtkNqzLgg_oSEKnvF_';

    const PROJECT_TYPES = [
      'Vinilo',
      'Cristalera',
      'Vehículo',
      'Lona',
      'Letras corpóreas',
      'Señalética',
      'Impresión',
      'Otro'
    ];

    const DEFAULT_TASKS = ['Tarea 1', 'Tarea 2', 'Tarea 3'];

    const state = {
      view: 'trabajos',
      session: null,
      profile: null,
      profiles: [],
      jobs: [],
      loading: true,
      error: '',
      info: '',
      filters: {
        search: '',
        user: 'all',
        type: 'all'
      }
    };

    const app = document.getElementById('app');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let tickTimer = null;
    let realtimeChannel = null;

    function esc(value){
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[ch]));
    }

    function fmtDate(iso){
      if(!iso) return '—';
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString('es-ES');
    }

    function toDatetimeLocal(iso){
      if(!iso) return '';
      const d = new Date(iso);
      if(Number.isNaN(d.getTime())) return '';
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0,16);
    }

    function fromDatetimeLocal(value){
      if(!value) return null;
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d.toISOString();
    }

    function hms(ms){
      const safe = Math.max(0, Math.floor(ms || 0));
      const sec = Math.floor(safe / 1000);
      const hh = String(Math.floor(sec / 3600)).padStart(2,'0');
      const mm = String(Math.floor((sec % 3600) / 60)).padStart(2,'0');
      const ss = String(sec % 60).padStart(2,'0');
      return `${hh}:${mm}:${ss}`;
    }

    function hoursDecimal(ms){
      return ((ms || 0) / 3600000).toFixed(1).replace('.', ',');
    }

    function normalizeAssignedTo(value){
      if(!value) return [];
      if(Array.isArray(value)) return value.filter(Boolean);
      return [value].filter(Boolean);
    }

    function currentUserId(){
      return state.session?.user?.id || null;
    }

    function isGeneral(){
      return state.profile?.role === 'general';
    }

    function isWorker(){
      return state.profile?.role === 'worker';
    }

    function profileNameById(id){
      const found = state.profiles.find(p => String(p.id) === String(id));
      return found?.display_name || 'Usuario';
    }

    function assignedNames(ids){
      return normalizeAssignedTo(ids).map(profileNameById);
    }

    function taskMyTime(task){
      return (task.user_times || []).find(
        row => String(row.user_id) === String(currentUserId())
      ) || null;
    }

    function taskTotalMs(task){
      if(!task.user_times?.length) return 0;

      return task.user_times.reduce((total, row) => {
        if(row.running && row.started_at_ms){
          return total + (row.elapsed_ms || 0) + (Date.now() - row.started_at_ms);
        }
        return total + (row.elapsed_ms || 0);
      }, 0);
    }

    function taskMyMs(task){
      const row = taskMyTime(task);
      if(!row) return 0;
      if(row.running && row.started_at_ms){
        return (row.elapsed_ms || 0) + (Date.now() - row.started_at_ms);
      }
      return row.elapsed_ms || 0;
    }

    function taskIsRunningForMe(task){
      const row = taskMyTime(task);
      return !!(row?.running && row?.started_at_ms);
    }

    function jobTotalMs(job){
      return (job.tasks || []).reduce((sum, task) => sum + taskTotalMs(task), 0);
    }

    function visibleJobs(){
      let rows = [...state.jobs];

      if(isWorker()){
        rows = rows.filter(job =>
          normalizeAssignedTo(job.assigned_to).some(id => String(id) === String(currentUserId()))
        );
      }

      const q = state.filters.search.trim().toLowerCase();
      if(q){
        rows = rows.filter(job => {
          const haystack = [
            job.name,
            job.project_type,
            job.operario,
            job.description,
            ...assignedNames(job.assigned_to),
            ...(job.tasks || []).map(t => t.name)
          ].join(' ').toLowerCase();

          return haystack.includes(q);
        });
      }

      if(state.filters.type !== 'all'){
        rows = rows.filter(job => job.project_type === state.filters.type);
      }

      if(isGeneral() && state.filters.user !== 'all'){
        rows = rows.filter(job =>
          normalizeAssignedTo(job.assigned_to).some(id => String(id) === String(state.filters.user))
        );
      }

      return rows;
    }

    function metrics(){
      const rows = visibleJobs();
      const totalMs = rows.reduce((sum, job) => sum + jobTotalMs(job), 0);
      const activeTasks = rows.reduce((sum, job) => {
        return sum + (job.tasks || []).filter(task =>
          (task.user_times || []).some(row => row.running && row.started_at_ms)
        ).length;
      }, 0);

      const visibleUsers = new Set();
      rows.forEach(job => {
        normalizeAssignedTo(job.assigned_to).forEach(id => visibleUsers.add(String(id)));
      });

      return {
        jobs: rows.length,
        totalMs,
        activeTasks,
        users: visibleUsers.size,
        jobsWithHours: rows.filter(job => jobTotalMs(job) > 0).length
      };
    }

    function workerProfiles(){
      return state.profiles.filter(p => p.role === 'worker');
    }

    function clearNotice(){
      state.error = '';
      state.info = '';
    }

    function stopTicking(){
      if(tickTimer){
        clearInterval(tickTimer);
        tickTimer = null;
      }
    }

    function startTicking(){
      stopTicking();
      tickTimer = setInterval(() => {
        refreshLiveTimes();
      }, 1000);
    }

    async function bindRealtime(enabled){
      if(realtimeChannel){
        await supabase.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }

      if(!enabled) return;

      realtimeChannel = supabase
        .channel('rotulos-iris-realtime')
        .on('postgres_changes', { event:'*', schema:'public', table:'jobs' }, () => bootstrap(false))
        .on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, () => bootstrap(false))
        .on('postgres_changes', { event:'*', schema:'public', table:'task_user_times' }, () => bootstrap(false))
        .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, () => bootstrap(false))
        .subscribe();
    }

    async function bootstrap(showLoader = true){
      clearNotice();
      if(showLoader){
        state.loading = true;
        render();
      }

      if(!state.session){
        state.profile = null;
        state.profiles = [];
        state.jobs = [];
        state.loading = false;
        stopTicking();
        await bindRealtime(false);
        render();
        return;
      }

      const uid = currentUserId();

      const [profileRes, profilesRes, jobsRes] = await Promise.all([
        supabase
          .from('profiles')
          .select('*')
          .eq('id', uid)
          .maybeSingle(),

        supabase
          .from('profiles')
          .select('*')
          .order('display_name', { ascending:true }),

        supabase
          .from('jobs')
          .select(`
            *,
            tasks (
              *,
              user_times:task_user_times (*)
            )
          `)
          .order('created_at', { ascending:false })
      ]);

      if(profileRes.error){
        state.error = profileRes.error.message;
      }

      if(profilesRes.error && !state.error){
        state.error = profilesRes.error.message;
      }

      if(jobsRes.error && !state.error){
        state.error = jobsRes.error.message;
      }

      state.profile = profileRes.data || null;
      state.profiles = profilesRes.data || [];
      state.jobs = (jobsRes.data || []).map(job => ({
        ...job,
        assigned_to: normalizeAssignedTo(job.assigned_to),
        tasks: (job.tasks || [])
          .map(task => ({
            ...task,
            user_times: task.user_times || []
          }))
          .sort((a,b) => (a.task_order || 0) - (b.task_order || 0))
      }));

      if(!isGeneral() && state.view === 'informes'){
        state.view = 'trabajos';
      }

      state.loading = false;
      startTicking();
      await bindRealtime(true);
      render();
    }

    async function initApp(){
      try{
        const { data, error } = await supabase.auth.getSession();
        if(error) throw error;
        state.session = data.session || null;

        supabase.auth.onAuthStateChange(async (_event, session) => {
          state.session = session || null;
          await bootstrap(false);
        });

        await bootstrap();
      }catch(err){
        state.loading = false;
        state.error = err?.message || 'Error al iniciar la aplicación.';
        render();
      }
    }

    async function login(email, password){
      clearNotice();
      state.loading = true;
      render();

      const { user, session, error } = await supabase.auth.signIn({
  email,
  password
});


      if(error){
        state.loading = false;
        state.error = error.message;
        render();
        return;
      }

      state.session = session || null;
      await bootstrap(false);
    }

    async function logout(){
      clearNotice();
      await supabase.auth.signOut();
      state.view = 'trabajos';
      state.session = null;
      state.profile = null;
      state.jobs = [];
      state.loading = false;
      stopTicking();
      await bindRealtime(false);
      render();
    }

    async function createJob(form){
      clearNotice();

      const name = form.name.value.trim();
      const projectType = form.project_type.value || null;
      const operario = form.operario.value.trim() || null;
      const description = form.description.value.trim() || null;
      const plannedStart = fromDatetimeLocal(form.planned_start.value);
      const plannedEnd = fromDatetimeLocal(form.planned_end.value);
      const assigned = Array.from(
        form.querySelectorAll('input[name="assigned"]:checked')
      ).map(i => i.value);

      if(!name){
        state.error = 'Pon un nombre al trabajo.';
        render();
        return;
      }

      if(!assigned.length){
        state.error = 'Selecciona al menos un operario.';
        render();
        return;
      }

      const { data: job, error } = await supabase
        .from('jobs')
        .insert({
          name,
          project_type: projectType,
          operario,
          description,
          assigned_to: assigned,
          created_by: currentUserId(),
          planned_start: plannedStart,
          planned_end: plannedEnd,
          status: 'pendiente'
        })
        .select()
        .single();

      if(error){
        state.error = error.message;
        render();
        return;
      }

      const taskRows = DEFAULT_TASKS.map((taskName, index) => ({
        job_id: job.id,
        name: taskName,
        task_order: index + 1,
        created_by: currentUserId(),
        actual_start: null,
        actual_end: null
      }));

      const { data: createdTasks, error: taskError } = await supabase
        .from('tasks')
        .insert(taskRows)
        .select();

      if(taskError){
        state.error = taskError.message;
        render();
        return;
      }

      const timeRows = [];
      for(const task of createdTasks || []){
        for(const userId of assigned){
          timeRows.push({
            task_id: task.id,
            user_id: userId,
            elapsed_ms: 0,
            running: false,
            started_at_ms: null,
            actual_start: null,
            actual_end: null
          });
        }
      }

      if(timeRows.length){
        const { error: timeError } = await supabase
          .from('task_user_times')
          .insert(timeRows);

        if(timeError){
          state.error = timeError.message;
          render();
          return;
        }
      }

      form.reset();
      state.info = 'Trabajo creado correctamente.';
      await bootstrap(false);
    }

    async function deleteJob(jobId){
      if(!confirm('¿Eliminar este trabajo?')) return;

      const { error } = await supabase
        .from('jobs')
        .delete()
        .eq('id', jobId);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      state.info = 'Trabajo eliminado.';
      await bootstrap(false);
    }

    async function updateTaskName(taskId, value){
      const clean = value.trim() || 'Sin nombre';

      const { error } = await supabase
        .from('tasks')
        .update({ name: clean })
        .eq('id', taskId);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      await bootstrap(false);
    }

    async function startTask(taskId){
      const task = state.jobs.flatMap(job => job.tasks || []).find(t => t.id === taskId);
      const row = task ? taskMyTime(task) : null;
      if(!row) return;

      const nowIso = new Date().toISOString();

      const payload = {
        running: true,
        started_at_ms: Date.now()
      };

      if(!row.actual_start){
        payload.actual_start = nowIso;
      }

      const { error } = await supabase
        .from('task_user_times')
        .update(payload)
        .eq('id', row.id);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      await bootstrap(false);
    }

    async function stopTask(taskId){
      const task = state.jobs.flatMap(job => job.tasks || []).find(t => t.id === taskId);
      const row = task ? taskMyTime(task) : null;
      if(!row) return;

      const extra = row.running && row.started_at_ms
        ? (Date.now() - row.started_at_ms)
        : 0;

      const { error } = await supabase
        .from('task_user_times')
        .update({
          elapsed_ms: (row.elapsed_ms || 0) + extra,
          running: false,
          started_at_ms: null,
          actual_end: new Date().toISOString()
        })
        .eq('id', row.id);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      await bootstrap(false);
    }

    async function manualTime(taskId, hours, minutes){
      const task = state.jobs.flatMap(job => job.tasks || []).find(t => t.id === taskId);
      if(!task) return;

      const row = taskMyTime(task);
      if(!row) return;

      const totalMs = (Number(hours || 0) * 3600000) + (Number(minutes || 0) * 60000);

      const { error } = await supabase
        .from('task_user_times')
        .update({
          elapsed_ms: totalMs,
          running: false,
          started_at_ms: null
        })
        .eq('id', row.id);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      await bootstrap(false);
    }

    async function updateActualTimes(taskId, start, end){
      const task = state.jobs.flatMap(job => job.tasks || []).find(t => t.id === taskId);
      if(!task) return;

      const row = taskMyTime(task);
      if(!row) return;

      const startIso = fromDatetimeLocal(start);
      const endIso = fromDatetimeLocal(end);

      const { error } = await supabase
        .from('task_user_times')
        .update({
          actual_start: startIso,
          actual_end: endIso
        })
        .eq('id', row.id);

      if(error){
        state.error = error.message;
        render();
        return;
      }

      await bootstrap(false);
    }

    function refreshLiveTimes(){
      document.querySelectorAll('[data-task-id]').forEach(el => {
        const taskId = el.dataset.taskId;
        const type = el.dataset.liveType;

        const task = state.jobs.flatMap(job => job.tasks || []).find(t => t.id === taskId);
        if(!task) return;

        const ms = type === 'my' ? taskMyMs(task) : taskTotalMs(task);
        el.textContent = hms(ms);
      });

      document.querySelectorAll('[data-job-id]').forEach(el => {
        const jobId = el.dataset.jobId;
        const job = state.jobs.find(j => j.id === jobId);
        if(!job) return;
        el.textContent = `${hoursDecimal(jobTotalMs(job))} h`;
      });

      const totalVisible = visibleJobs().reduce((sum, job) => sum + jobTotalMs(job), 0);
      const globalEl = document.getElementById('live-total-hours');
      if(globalEl){
        globalEl.textContent = `${hoursDecimal(totalVisible)} h`;
      }
    }

    function renderSidebar(){
      return `
        <div class="sidebar">
          <div class="nav-title">Navegación</div>
          <div class="nav">
            <button class="${state.view === 'trabajos' ? 'active' : ''}" data-view="trabajos">Trabajos</button>
            ${isGeneral() ? `<button class="${state.view === 'informes' ? 'active' : ''}" data-view="informes">Informes</button>` : ''}
          </div>

          <div class="side-meta">
            <div>Usuario activo: <strong>${esc(state.profile?.display_name || '')}</strong></div>
            <div>Rol: <strong>${esc(state.profile?.role || '')}</strong></div>
          </div>
        </div>
      `;
    }

    function renderCreateJob(){
      if(!isGeneral()) return '';

      return `
        <div class="panel">
          <h2>Nuevo trabajo</h2>
          <p class="subtext">Crea un trabajo y asígnalo a uno o varios operarios.</p>

          <form id="job-form" style="margin-top:18px">
            <div class="toolbar" style="grid-template-columns:1fr 1fr;">
              <input name="name" placeholder="Nombre del trabajo" required />
              <select name="project_type">
                <option value="">Tipo de proyecto</option>
                ${PROJECT_TYPES.map(type => `<option value="${esc(type)}">${esc(type)}</option>`).join('')}
              </select>
            </div>

            <div class="toolbar" style="grid-template-columns:1fr 1fr;">
              <input name="operario" placeholder="Operario principal" />
              <input type="text" disabled value="Se crearán 3 tareas por defecto" />
            </div>

            <div class="grid-2">
              <input name="planned_start" type="datetime-local" />
              <input name="planned_end" type="datetime-local" />
            </div>

            <textarea name="description" placeholder="Descripción del trabajo"></textarea>

            <label>Asignar a operarios</label>
            <div class="worker-picker">
              ${workerProfiles().map(p => `
                <label class="worker-pill">
                  <input type="checkbox" name="assigned" value="${p.id}">
                  ${esc(p.display_name)}
                </label>
              `).join('')}
            </div>

            <div style="margin-top:18px">
              <button class="btn btn-primary">Crear trabajo</button>
            </div>
          </form>
        </div>
      `;
    }

    function renderTask(task){
      const myRow = taskMyTime(task);
      const running = taskIsRunningForMe(task);
      const total = taskTotalMs(task);
      const myMs = taskMyMs(task);

      return `
        <div class="task-card">
          <div class="task-title">${esc(task.name || 'Sin nombre')}</div>

          <div class="time-label">${isWorker() ? 'Tu tiempo' : 'Tiempo total'}</div>
          <div class="time-value" data-live-type="${isWorker() ? 'my' : 'total'}" data-task-id="${task.id}">
            ${hms(isWorker() ? myMs : total)}
          </div>

          <div class="task-status">
            ${isWorker()
              ? (running ? '🟢 Temporizador activo' : '⏸️ Temporizador parado')
              : 'Vista general'
            }
          </div>

          <label>Nombre de tarea</label>
          <input id="task_name_${task.id}" value="${esc(task.name || '')}" />

          <div class="task-actions">
            ${isWorker() && myRow ? (
              running
                ? `<button class="btn btn-warning" data-action="stop-task" data-task-id="${task.id}">Parar</button>`
                : `<button class="btn btn-success" data-action="start-task" data-task-id="${task.id}">Inicio</button>`
            ) : `<button class="btn btn-gray" disabled>Sin temporizador</button>`}

            <button class="btn btn-soft" data-action="save-task-name" data-task-id="${task.id}">
              Guardar nombre
            </button>
          </div>

          ${isGeneral() ? `
            <div class="manual-grid">
              <input id="h_${task.id}" type="number" min="0" placeholder="Horas">
              <input id="m_${task.id}" type="number" min="0" max="59" placeholder="Minutos">
              <button class="btn btn-soft" data-action="manual-time" data-task-id="${task.id}">
                Modificar tiempo
              </button>
            </div>
          ` : ''}

          <details>
            <summary>${isGeneral() ? 'Horas reales (por tu control)' : 'Tus horas reales'}</summary>

            <div class="hours-grid">
              <input id="s_${task.id}" type="datetime-local" value="${toDatetimeLocal(myRow?.actual_start || '')}">
              <input id="e_${task.id}" type="datetime-local" value="${toDatetimeLocal(myRow?.actual_end || '')}">
              <button class="btn btn-soft" data-action="save-actual" data-task-id="${task.id}">
                Guardar
              </button>
            </div>

            <div class="hours-meta">
              Inicio real: ${fmtDate(myRow?.actual_start || '')}<br>
              Fin real: ${fmtDate(myRow?.actual_end || '')}
            </div>
          </details>
        </div>
      `;
    }

    function renderJobs(){
      const rows = visibleJobs();

      if(!rows.length){
        return `<div class="empty">No hay trabajos para mostrar.</div>`;
      }

      return `
        <div class="jobs-list">
          ${rows.map(job => `
            <div class="job-card">
              <div class="job-top">
                <div>
                  <h3 class="job-title">${esc(job.name)}</h3>
                  <div class="job-badges">
                    <span class="badge primary">${esc(job.project_type || 'Sin tipo')}</span>
                    <span class="badge dark">${esc(job.operario || 'Sin operario')}</span>
                    <span class="badge success">${assignedNames(job.assigned_to).join(', ') || 'Sin asignados'}</span>
                    <span class="badge warning" data-job-id="${job.id}">${hoursDecimal(jobTotalMs(job))} h</span>
                    <span class="badge warning">${esc(job.status || 'pendiente')}</span>

                  </div>
                  ${job.description ? `<p class="job-desc">${esc(job.description)}</p>` : ''}
                </div>

                <div class="job-times">
                  <div>Inicio previsto: ${fmtDate(job.planned_start)}</div>
                  <div>Fin previsto: ${fmtDate(job.planned_end)}</div>
                </div>
              </div>

              ${isGeneral() ? `
                <div class="job-actions">
                  <button class="btn btn-danger" data-action="delete-job" data-job-id="${job.id}">
                    Eliminar trabajo
                  </button>
                </div>
              ` : ''}

              <div class="tasks-grid">
                ${(job.tasks || []).map(task => renderTask(task)).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderReports(){
      if(!isGeneral()) return '';

      const projectRows = visibleJobs()
        .map(job => ({
          name: job.name,
          totalMs: jobTotalMs(job)
        }))
        .sort((a,b) => b.totalMs - a.totalMs);

      const userTotals = new Map();
      for(const job of state.jobs){
        for(const task of (job.tasks || [])){
          for(const row of (task.user_times || [])){
            const prev = userTotals.get(String(row.user_id)) || 0;
            const now = prev + (row.elapsed_ms || 0) + ((row.running && row.started_at_ms) ? (Date.now() - row.started_at_ms) : 0);
            userTotals.set(String(row.user_id), now);
          }
        }
      }

      const userRows = [...userTotals.entries()]
        .map(([id, totalMs]) => ({
          name: profileNameById(id),
          totalMs
        }))
        .sort((a,b) => b.totalMs - a.totalMs);

      return `
        <div class="panel">
          <h2>Informes</h2>
          <p class="subtext">Vista solo para usuario general.</p>

          <div class="report-grid">
            <div class="report-card">
              <h3>Horas por usuario</h3>
              <div class="report-list">
                ${userRows.length ? userRows.map(row => `
                  <div class="report-row">
                    <span>${esc(row.name)}</span>
                    <strong>${hoursDecimal(row.totalMs)} h</strong>
                  </div>
                `).join('') : `<div class="empty">Sin datos</div>`}
              </div>
            </div>

            <div class="report-card">
              <h3>Horas por trabajo</h3>
              <div class="report-list">
                ${projectRows.length ? projectRows.map(row => `
                  <div class="report-row">
                    <span>${esc(row.name)}</span>
                    <strong>${hoursDecimal(row.totalMs)} h</strong>
                  </div>
                `).join('') : `<div class="empty">Sin datos</div>`}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMain(){
      return `
        <div class="wrap">
          ${renderHeader()}

          <div class="layout">
            ${renderSidebar()}

            <div class="content">
              ${state.error ? `<div class="error-box">${esc(state.error)}</div>` : ''}
              ${state.info ? `<div class="ok-box">${esc(state.info)}</div>` : ''}

              ${state.view === 'trabajos' ? `
                <div class="panel">
                  <h2>${isGeneral() ? 'Todos los trabajos' : 'Mis trabajos'}</h2>
                  <p class="subtext">La información está sincronizada online entre dispositivos.</p>

                  <div class="toolbar">
                    <input id="filter_search" placeholder="Buscar por trabajo, operario o usuario" value="${esc(state.filters.search)}">
                    ${isGeneral() ? `
                      <select id="filter_user">
                        <option value="all">Todos los usuarios</option>
                        ${workerProfiles().map(p => `
                          <option value="${p.id}" ${state.filters.user === p.id ? 'selected' : ''}>
                            ${esc(p.display_name)}
                          </option>
                        `).join('')}
                      </select>
                    ` : `<input disabled value="Mi usuario">`}
                    <select id="filter_type">
                      <option value="all">Todos los tipos</option>
                      ${PROJECT_TYPES.map(type => `
                        <option value="${esc(type)}" ${state.filters.type === type ? 'selected' : ''}>${esc(type)}</option>
                      `).join('')}
                    </select>
                    <button class="btn btn-soft" data-action="apply-filters">Actualizar</button>
                  </div>

                  ${renderJobs()}
                </div>

                ${renderCreateJob()}
              ` : ''}

              ${state.view === 'informes' ? renderReports() : ''}
            </div>
          </div>
        </div>
      `;
    }

   function render(){
      if(state.loading){
        app.innerHTML = `<div class="loader"></div>`;
        return;
      }

      if(!state.session){
        app.innerHTML = renderLogin();
        return;
      }

      app.innerHTML = renderMain();
      refreshLiveTimes();
    }

    app.addEventListener('submit', async (e) => {
      const form = e.target;

      if(form.id === 'login-form'){
        e.preventDefault();
        await login(form.email.value.trim(), form.password.value);
      }

      if(form.id === 'job-form'){
        e.preventDefault();
        await createJob(form);
      }
    });

    app.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if(!btn) return;

      const action = btn.dataset.action;

      if(action === 'logout'){
        await logout();
        return;
      }

      if(action === 'apply-filters'){
        state.filters.search = document.getElementById('filter_search')?.value || '';
        if(isGeneral()){
          state.filters.user = document.getElementById('filter_user')?.value || 'all';
        }
        state.filters.type = document.getElementById('filter_type')?.value || 'all';
        render();
        return;
      }

      if(action === 'delete-job'){
        await deleteJob(btn.dataset.jobId);
        return;
      }

      if(action === 'start-task'){
        await startTask(btn.dataset.taskId);
        return;
      }

      if(action === 'stop-task'){
        await stopTask(btn.dataset.taskId);
        return;
      }

      if(action === 'save-task-name'){
        const taskId = btn.dataset.taskId;
        const value = document.getElementById(`task_name_${taskId}`)?.value || '';
        await updateTaskName(taskId, value);
        return;
      }

      if(action === 'manual-time'){
        const taskId = btn.dataset.taskId;
        const h = document.getElementById(`h_${taskId}`)?.value || 0;
        const m = document.getElementById(`m_${taskId}`)?.value || 0;
        await manualTime(taskId, h, m);
        return;
      }

      if(action === 'save-actual'){
        const taskId = btn.dataset.taskId;
        const start = document.getElementById(`s_${taskId}`)?.value || '';
        const end = document.getElementById(`e_${taskId}`)?.value || '';
        await updateActualTimes(taskId, start, end);
        return;
      }
    });

    app.addEventListener('change', (e) => {
      if(e.target.matches('.worker-pill input')){
        e.target.closest('.worker-pill')?.classList.toggle('active', e.target.checked);
      }
    });

    app.addEventListener('click', (e) => {
      const navBtn = e.target.closest('[data-view]');
      if(!navBtn) return;
      state.view = navBtn.dataset.view;
      render();
    });

    initApp();
  </script>
</body>
